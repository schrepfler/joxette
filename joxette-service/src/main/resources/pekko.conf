pekko {

  # Use SLF4J so Pekko log lines flow through Logback.
  loggers          = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  loglevel         = "INFO"
  logging-filter   = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"

  # Let Spring drive shutdown order via PekkoConfig.shutdown() @PreDestroy.
  # Without this, Pekko registers its own JVM shutdown hook that can race with
  # Spring's hook and kill the actor system before RecordingCoordinator.stopAll()
  # has finished sending stop messages to the coordinator actor.
  coordinated-shutdown.run-by-jvm-shutdown-hook = off

  actor {
    provider = "cluster"

    # Keep the actor-mailbox dispatcher tiny: it only routes messages between
    # actors. All heavy work (Jox pipeline, DuckDB, Kafka) runs on virtual
    # threads via context.pipeToSelf / CompletableFuture.supplyAsync.
    default-dispatcher {
      executor = "thread-pool-executor"
      thread-pool-executor.fixed-pool-size = 4
    }

    serialization-bindings {
      "java.io.Serializable" = java
    }
  }

  remote.artery {
    canonical.hostname = "127.0.0.1"
    canonical.port     = 0   # 0 = OS-assigned; override via PEKKO_REMOTE_PORT env-var or application.yml
  }

  cluster {
    # Empty seed-nodes: PekkoConfig.actorSystem() issues a programmatic self-join
    # after the ActorSystem starts, so the bound port is always correct regardless
    # of whether canonical.port is 0 (OS-assigned) or a fixed value.
    seed-nodes = []

    # Split-brain resolver: keep the majority partition alive.
    # For single-node setups this is a no-op.
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    split-brain-resolver.active-strategy = keep-majority

    # Reduce gossip noise in single-node local dev.
    failure-detector.threshold = 10.0
  }

  # Cap coordinated-shutdown phase timeouts so Ctrl+C exits quickly.
  # cluster-* phases: node is always Up after self-join, so leave/exiting
  # should complete in well under 3 s on a single node.
  # actor-system-terminate: shuts down dispatchers and Artery transport;
  # 5 s is generous for local dev.
  # after-actor-system-terminate: final cleanup (logger, etc.); 2 s is plenty.
  coordinated-shutdown.phases {
    cluster-leave.timeout               = 3s
    cluster-exiting.timeout             = 3s
    cluster-exiting-done.timeout        = 3s
    cluster-shutdown.timeout            = 3s
    actor-system-terminate.timeout      = 5s
    after-actor-system-terminate.timeout = 2s
  }
}
