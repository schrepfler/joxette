spring:
  application:
    name: joxette
  main:
    allow-circular-references: true
  # Disable Spring auto-config for Kafka (we use Jox Kafka directly)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# ---------------------------------------------------------------------------
# Joxette configuration
# ---------------------------------------------------------------------------
joxette:

  catalog:
    path: "./data/joxette.ducklake"
    object-storage-path: "s3://joxette-data/"
    # auto-migrate: true   # set false to skip automatic catalog migration on startup (DuckLake 1.0+)
    # metadata-query-logging: true   # enables DuckLakeMetadata catalog query tracing (DuckLake 1.0+)
    # inlining-row-limit: 0          # 0 = disable inlining, always write Parquet directly (DuckLake 1.0+ PR #923)
    #   Records per-query elapsed times for ATTACH, ducklake_migrate(), and schema setup.
    #   Entries are drained to SLF4J after startup (and after compaction runs) via:
    #     logging:
    #       level:
    #         com.joxette.catalog.ducklake: DEBUG

  inline:
    threshold-mb: 4
    threshold-records: 50000

  retention:
    schedule: "0 0 1 * * *"

  compaction:
    schedule: "0 0 3 * * *"
    entity:
      min-files-per-bucket: 10
      target-file-size-mb: 256
      lookback-days: 30
    general:
      enabled: false
      min-files-per-partition: 20
      target-file-size-mb: 256
      lookback-days: 30

  kafka:
    bootstrap-servers: "localhost:9092"

  recording:
    batch-size: 10000
    batch-timeout-ms: 1000

  threading:
    write-channel-capacity: 128
    default-source-parallelism: 1
    compaction-thread-type: virtual

  replay:
    max-scheduled: 50

  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:4173

  s3:
    endpoint: "http://localhost:9000"
    access-key: "joxettedev"
    secret-key: "joxettedev123"
    region: "us-east-1"

  # ---------------------------------------------------------------------------
  # Bootstrap seed: loaded only on first start when config tables are empty.
  #
  # Domain model:
  #   entity.type  — the logical entity name (e.g. "fixture").
  #                  One DuckLake table is created per entity type:
  #                  lake.entity_<type>
  #
  #   sources      — topics that carry messages about this entity.
  #     matchers   — one entry per message variant that references this entity.
  #                  The router tries matchers in declaration order and stops
  #                  at the first one that yields an ID.
  #       message-type  — label stored in the cassette's message_type column.
  #       source        — where to extract the ID: key | value | header
  #       expression    — JSONPath (for value) or header name (for header)
  #
  # All message variants for the same entity feed into the SAME cassette,
  # giving a unified timeline across message types.
  # ---------------------------------------------------------------------------
  bootstrap:
    topics:
      - topic: "events"
        mode: "both"   # record to general cassette AND index entities

    entities:
      # All sports-data entity types share the same topic ("events") and
      # use fixtureId as their identity key.  Each message variant is one
      # matcher under the single source mapping.
      - type: "fixture"
        buckets: 256
        sources:
          - topic: "events"
            mode: "entity_only"
            matchers:
              - message-type: "fixture"
                source: "value"
                expression: "$.fixture.id"
              - message-type: "marketSet"
                source: "value"
                expression: "$.marketSet.fixtureId"
              - message-type: "footballMatchSummary"
                source: "value"
                expression: "$.footballMatchSummary.fixtureId"
              - message-type: "resultSet"
                source: "value"
                expression: "$.resultSet.fixtureId"
              - message-type: "coverage"
                source: "value"
                expression: "$.coverage.fixtureId"
              - message-type: "footballMatchDetails"
                source: "value"
                expression: "$.footballMatchDetails.fixtureId"
