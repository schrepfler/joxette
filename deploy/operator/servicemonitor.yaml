# Prometheus Operator scrape of the operator's own JOSDK + JVM metrics.
# Requires the Prometheus Operator CRDs; skip if not installed.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: joxette-operator
  namespace: joxette-system
  labels:
    app.kubernetes.io/name: joxette-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: joxette-operator
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
