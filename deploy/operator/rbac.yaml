# Cluster-scoped RBAC for the operator: watch the joxette.dev CRs and manage the
# workloads/Services/RBAC that the JoxetteCluster reconciler creates.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: joxette-operator
  labels:
    app.kubernetes.io/name: joxette-operator
rules:
  # Custom resources + their status.
  - apiGroups: ["joxette.dev"]
    resources: ["joxetteclusters", "recordedtopics", "entitytypes"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["joxette.dev"]
    resources: ["joxetteclusters/status", "recordedtopics/status", "entitytypes/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["joxette.dev"]
    resources: ["joxetteclusters/finalizers", "recordedtopics/finalizers", "entitytypes/finalizers"]
    verbs: ["update"]
  # Workloads the JoxetteCluster reconciler owns.
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "serviceaccounts", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pod RBAC the reconciler provisions for pekko-management mode.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # CRD read (JOSDK validates the CRD is installed at startup).
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # Events for surfacing reconcile outcomes.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: joxette-operator
  labels:
    app.kubernetes.io/name: joxette-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: joxette-operator
subjects:
  - kind: ServiceAccount
    name: joxette-operator
    namespace: joxette-system
