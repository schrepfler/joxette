apiVersion: v2
name: joxette
description: |
  Joxette — Kafka topic cassette recorder backed by DuckLake. This chart deploys
  joxette-service either as a single all-in-one StatefulSet (embedded DuckDB
  catalog) or as horizontally-scalable role tiers (shared Quack/PostgreSQL
  catalog), and supports both the self-join (catalog) and shared-cluster
  (pekko-management) clustering modes.
type: application
# Chart version — bump on chart changes.
version: 0.1.0
# Default joxette-service image tag when image.tag is unset.
appVersion: "0.1.0"
keywords:
  - kafka
  - ducklake
  - cdc
  - event-recording
home: https://github.com/schrepfler/joxette
sources:
  - https://github.com/schrepfler/joxette
maintainers:
  - name: Joxette maintainers
