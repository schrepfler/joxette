{{- /* Main Service — the REST API target (8080), used by clients and the operator. */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "joxette.fullname" . }}
  labels:
    {{- include "joxette.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "joxette.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
{{- if eq .Values.clustering.mode "pekko-management" }}
---
{{- /*
Headless Service — gives each pod a stable, individually-addressable DNS name for
Pekko remoting/discovery. Required by kubernetes-api Cluster Bootstrap; discovery
finds peers by the pod-label-selector, but remoting needs per-pod addressing.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "joxette.fullname" . }}-headless
  labels:
    {{- include "joxette.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "joxette.selectorLabels" . | nindent 4 }}
  ports:
    - name: management
      port: {{ .Values.clustering.managementPort }}
      targetPort: management
      protocol: TCP
{{- else if eq .Values.catalog.backend "embedded" }}
---
{{- /* StatefulSet requires a governing headless Service even in catalog mode. */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "joxette.fullname" . }}-headless
  labels:
    {{- include "joxette.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "joxette.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
{{- end }}
